<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="figureGrad" x1="25" y1="15" x2="75" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E879B0"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="50" cy="50" r="43"/>
    </clipPath>
  </defs>

  <!-- White background circle -->
  <circle cx="50" cy="50" r="46" fill="white"/>

  <!-- Gradient ring -->
  <circle cx="50" cy="50" r="44" stroke="url(#ringGrad)" stroke-width="5" fill="none"/>

  <!-- Silhouette clipped inside ring -->
  <g clip-path="url(#circleClip)">
    <!-- Head -->
    <circle cx="50" cy="33" r="13" fill="url(#figureGrad)"/>
    <!-- Body / shoulders -->
    <path d="M14 95 C14 72 28 62 50 62 C72 62 86 72 86 95 Z" fill="url(#figureGrad)"/>
  </g>
</svg>
